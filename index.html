<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AG Habit Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: Arial; background: #f5f5f5; margin: 0; padding: 20px; }
    button { cursor: pointer; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

const { useState, useEffect } = React;

function dateKey(d) {
  return d.toISOString().split("T")[0];
}

function getStreak(completions = {}) {
  let streak = 0;
  const d = new Date();
  while (completions[dateKey(d)]) {
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

function App() {
  const [habits, setHabits] = useState(() => {
    const saved = localStorage.getItem("habits");
    return saved ? JSON.parse(saved) : [
      { id: 1, name: "Drink water", done: false, completions: {} },
      { id: 2, name: "Workout", done: false, completions: {} }
    ];
  });

  const today = dateKey(new Date());

  useEffect(() => {
    localStorage.setItem("habits", JSON.stringify(habits));
  }, [habits]);

  const toggle = (id) => {
    setHabits(habits.map(h => {
      if (h.id !== id) return h;
      const c = { ...h.completions };
      c[today] = !c[today];
      return { ...h, completions: c };
    }));
  };

  const addHabit = () => {
    const name = prompt("New habit:");
    if (!name) return;
    setHabits([...habits, {
      id: Date.now(),
      name,
      completions: {}
    }]);
  };

  return (
    <div>
      <h1>AG Habit Tracker</h1>
      <button onClick={addHabit}>+ Add Habit</button>

      {habits.map(h => {
        const done = h.completions[today];
        const streak = getStreak(h.completions);

        return (
          <div key={h.id} style={{
            marginTop: 10,
            padding: 10,
            background: "white",
            borderRadius: 8
          }}>
            <span
              onClick={() => toggle(h.id)}
              style={{
                cursor: "pointer",
                marginRight: 10
              }}
            >
              {done ? "✅" : "⬜"}
            </span>

            {h.name}

            {streak > 0 && (
              <span style={{ marginLeft: 10, color: "orange" }}>
                🔥 {streak}
              </span>
            )}
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
